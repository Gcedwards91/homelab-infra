- name: Allow MySQL traffic through firewalld
  ansible.builtin.firewalld:
    service: mysql
    permanent: true
    state: enabled
    immediate: yes

- name: Install MariaDB
  ansible.builtin.yum:
    name: mariadb-server
    state: present

- name: Start and enable MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Create app database
  community.mysql.mysql_db:
    name: appdb
    state: present

- name: Create webuser for app
  community.mysql.mysql_user:
    name: webuser
    password: webpass
    host: "%"
    priv: "appdb.*:ALL"
    state: present


- name: Allow MySQL traffic through firewalld
  ansible.builtin.firewalld:
    service: mysql
    permanent: true
    state: enabled
    immediate: yes

- name: Install MariaDB
  ansible.builtin.yum:
    name: mariadb-server
    state: present

- name: Start and enable MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

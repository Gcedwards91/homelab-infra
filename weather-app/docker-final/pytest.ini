[pytest]
# Markers used across the integration suite.
markers =
    destructive: tests that mutate the running stack (stop containers, spike CPU,
        wait out alert windows). Excluded from default runs. Run explicitly with
        'pytest -m destructive' or via the manual workflow_dispatch CI job.

# Default runs exclude destructive tests so every-push CI stays fast and never
# mutates the live stack. Override with 'pytest -m destructive' (last -m wins)
# or 'pytest -m ""' to run everything.
addopts = -m "not destructive"

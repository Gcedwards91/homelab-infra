---
groups:
  - name: container_alerts
    rules:
      - alert: ContainerDown
        expr: up{job=~"weather_app|loki|prometheus|grafana|statporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is unreachable"
          description: "{{ $labels.job }} has been unreachable for more than 2 minutes."

      - alert: ContainerHighMemory
        expr: container_memory_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container memory above 80%"
          description: "Container {{ $labels.name }} memory usage is above 80% for 5 minutes."

      - alert: ContainerHighCPU
        expr: container_cpu_percent > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container CPU sustained above 90%"
          description: "Container {{ $labels.name }} CPU usage has been above 90% for 5 minutes."

  - name: stack_alerts
    rules:
      - alert: LokiIngestStopped
        expr: rate(loki_distributor_lines_received_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki not receiving logs"
          description: "Loki has not ingested any log lines in the last 5 minutes."

      - alert: WeatherAppHighErrorRate
        expr: rate(flask_http_request_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Weather app 5xx error rate elevated"
          description: "The weather app is returning 5xx errors at more than 0.05 req/s over the last 5 minutes."

  - name: playground_alerts
    rules:
      - alert: DemoContainerDown
        expr: (up{job="statporter"} == 1) and on() absent(container_cpu_percent{name="demo_container"})
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "demo-container is not running"
          description: "statporter is healthy but demo-container has been absent from metrics for more than 60 seconds."

      - alert: DemoContainerHighCPU
        expr: container_cpu_percent{name="demo_container"} > 80
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "demo-container CPU above 80%"
          description: "demo-container CPU has been above 80% for 30 seconds."

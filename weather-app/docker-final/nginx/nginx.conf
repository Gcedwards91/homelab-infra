events {}

http {
  # Upstreams by service name on the Docker bridge network
  upstream weather_app   { server weather-app:5000; }
  upstream grafana_up    { server grafana:3000; }
  upstream prometheus_up { server prometheus:9090; }

  # Brute-force protection for the playground auth endpoints
  limit_req_zone $binary_remote_addr zone=login:10m  rate=10r/m;
  # Abuse protection for the public Prometheus surface (arbitrary PromQL)
  limit_req_zone $binary_remote_addr zone=promql:10m rate=10r/s;
  # Return 429 (not nginx's default 503) so rate limiting is unambiguous and
  # doesn't collide with the app's own 503 (missing PLAYGROUND_SECRET).
  limit_req_status 429;

  server {
    listen 80;
    server_name _;

    # Security headers
    # NOTE: add_header directives inside a location block REPLACE the entire
    # server-level set, so any location that declares its own headers must
    # redeclare all four (see /grafana/ and /prometheus/ below).
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    # Strict app-surface CSP: no 'unsafe-eval'. Grafana/Prometheus get their
    # own looser policy scoped to their location blocks only.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Block external access to Prometheus metrics scrape endpoint
    location = /metrics {
      return 403;
    }

    # Playground login: rate-limited against passphrase brute force
    location = /playground/login {
      limit_req zone=login burst=10 nodelay;
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Admin passphrase endpoint: rate-limited against bearer-key brute force
    location = /playground/passphrase {
      limit_req zone=login burst=10 nodelay;
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Playground UI
    location /playground {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Playground JSON API
    location /api/playground/ {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Root -> Flask app
    location / {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Grafana under /grafana/
    location /grafana/ {
      # Full header redeclaration: this block's add_header set replaces the
      # server-level set. Grafana's trace-link table panel needs 'unsafe-eval'
      # (new Function() in its link template engine - CLAUDE.md gotcha #15).
      add_header X-Content-Type-Options   "nosniff"                          always;
      add_header X-Frame-Options          "DENY"                             always;
      add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
      add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

      proxy_pass http://grafana_up;
      proxy_http_version 1.1;
      proxy_set_header Connection           "";

      proxy_set_header Host                 $http_host;
      proxy_set_header X-Real-IP            $remote_addr;
      proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto    $scheme;
      proxy_set_header X-Forwarded-Host     $http_host;
      proxy_set_header X-Forwarded-Port     $server_port;

      proxy_set_header X-Forwarded-Prefix   /grafana;

      proxy_redirect off;
    }

    # Prometheus under /prometheus/
    # Public by design (portfolio showcase + playground alert feed), but
    # rate-limited: it accepts arbitrary PromQL from anonymous clients.
    location /prometheus/ {
      limit_req zone=promql burst=20 nodelay;

      # Full header redeclaration (see note above). The Prometheus UI is a
      # third-party React app; it gets the same loose policy as Grafana.
      add_header X-Content-Type-Options   "nosniff"                          always;
      add_header X-Frame-Options          "DENY"                             always;
      add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
      add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

      proxy_pass http://prometheus_up/;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_redirect off;
    }

  }
}

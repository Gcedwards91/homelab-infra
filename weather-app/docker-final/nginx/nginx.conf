events {}

http {
  # Upstreams by service name on the Docker bridge network
  upstream weather_app   { server weather-app:5000; }
  upstream grafana_up    { server grafana:3000; }
  upstream prometheus_up { server prometheus:9090; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Block external access to Prometheus metrics scrape endpoint
    location = /metrics {
      return 403;
    }

    # Playground UI and login
    location /playground {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Playground JSON API
    location /api/playground/ {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Root -> Flask app
    location / {
      proxy_pass http://weather_app;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header traceparent       $http_traceparent;
      proxy_set_header tracestate        $http_tracestate;
      proxy_redirect off;
    }

    # Grafana under /grafana/
    location /grafana/ {
      proxy_pass http://grafana_up;
      proxy_http_version 1.1;
      proxy_set_header Connection           "";

      proxy_set_header Host                 $http_host;
      proxy_set_header X-Real-IP            $remote_addr;
      proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto    $scheme;
      proxy_set_header X-Forwarded-Host     $http_host;
      proxy_set_header X-Forwarded-Port     $server_port;

      proxy_set_header X-Forwarded-Prefix   /grafana;

      proxy_redirect off;
    }

    # Prometheus under /prometheus/
    location /prometheus/ {
      proxy_pass http://prometheus_up/;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_redirect off;
    }

  }
}

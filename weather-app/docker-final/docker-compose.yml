---
services:
  reverse-proxy:
    image: nginx:stable-alpine3.23
    container_name: reverse-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/empty.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - weather-app
      - grafana
      - prometheus
    networks:
      - monitoring
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  weather-app:
    image: burningstar4/weather-app:latest
    container_name: weather-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    expose:
      - "5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # rw — required for playground container toggle
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - PLAYGROUND_SECRET=${PLAYGROUND_SECRET}
      - PLAYGROUND_ADMIN_KEY=${PLAYGROUND_ADMIN_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=weather-app
    labels:
      - "app=weather"
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  demo-container:
    image: burningstar4/demo-container:latest
    container_name: demo-container
    restart: unless-stopped
    build:
      context: ../../demo-container/
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=${PROMETHEUS_URL:-http://localhost/prometheus/}"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:13.0.1-security-01
    container_name: grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    expose:
      - "3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost/grafana}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    expose:
      - "3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.6.11
    container_name: promtail
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/tmp
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      loki:
        condition: service_started
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  statporter:
    image: burningstar4/statporter:latest
    container_name: statporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=statporter
    expose:
      - "9800"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9800/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.10.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    expose:
      - "3200" # Tempo HTTP API (internal only)
      - "4317" # Tempo OTLP gRPC receiver (internal only)
    volumes:
      - ./tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: otel-collector
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    expose:
      - "4317" # OTLP gRPC receiver (internal only)
      - "4318" # OTLP HTTP receiver (internal only)
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    expose:
      - "9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command: --config.file=/etc/alertmanager/alertmanager.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "logging=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  promtail-positions:
  alertmanager-data:
  tempo_data:

networks:
  monitoring:
    driver: bridge

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BYOWeather</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <nav class="navbar">
        <a href="{{ url_for('about_me') }}">About Me</a>
        <a href="{{ url_for('index') }}">Homelab Blog</a>
        <a href="{{ url_for('resume') }}">Resume</a>
        <a href="{{ url_for('weather_app') }}" aria-current="page">Weather App</a>
        <a href="{{ url_for('playground.index') }}">Playground</a>
        <a href="/grafana/">Grafana</a>
      </nav>

      <h1>Weather Finder</h1>

      <p class="note">
        <strong>Note:</strong> This app requires you to bring your own
        <a href="https://openweathermap.org/appid" target="_blank" rel="noopener noreferrer"
          >OpenWeatherMap API key</a
        >. You can register for free and generate one from their website.
      </p>

      <form id="weather-form">
        <label for="mode">Search By:</label>
        <select id="mode" name="mode">
          <option value="city" selected>City</option>
          <option value="zip">ZIP Code</option>
        </select>

        <label for="location">City or ZIP Code:</label>
        <input
          type="text"
          id="location"
          name="location"
          placeholder="e.g., Atlanta or 30301"
          autocomplete="off"
          required
        />

        <label for="api_key">API Key:</label>
        <input
          type="password"
          id="api_key"
          name="api_key"
          placeholder="Your OpenWeatherMap API Key"
          autocomplete="off"
          required
        />

        <button type="submit">Get Weather</button>
      </form>

      <div id="error" role="alert" aria-live="assertive"></div>
      <div id="weather-display" aria-live="polite"></div>

      <div class="footer-icons">
        <a
          href="https://github.com/Gcedwards91"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Cliff Edwards on GitHub"
        >
          <img
            src="{{ url_for('static', filename='icons/github.svg') }}"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a
          href="https://www.linkedin.com/in/gcedwards91/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Cliff Edwards on LinkedIn"
        >
          <img
            src="{{ url_for('static', filename='icons/linkedin.svg') }}"
            alt=""
            aria-hidden="true"
          />
        </a>
      </div>
    </div>

    <script>
      const form = document.getElementById("weather-form");
      const display = document.getElementById("weather-display");
      const errorDiv = document.getElementById("error");
      const submitBtn = form.querySelector("button[type='submit']");
      const submitLabel = submitBtn.textContent;

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const location = document.getElementById("location").value.trim();
        const api_key = document.getElementById("api_key").value.trim();
        const mode = document.getElementById("mode").value;

        display.innerHTML = "";
        errorDiv.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Fetching...";

        try {
          const response = await fetch("/weather", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ location, api_key, mode }),
          });

          const data = await response.json();

          if (data.error) {
            errorDiv.textContent = data.error;
          } else {
            const heading = document.createElement("h2");
            heading.textContent = "Weather in " + data.city;

            const list = document.createElement("ul");
            [
              "Temperature: " + data.temp + "°F",
              "Feels like: " + data.feels_like + "°F",
              "Condition: " + data.description,
              "Humidity: " + data.humidity + "%",
              "Wind Speed: " + data.wind_speed + " mph",
            ].forEach(function (text) {
              const li = document.createElement("li");
              li.textContent = text;
              list.appendChild(li);
            });

            display.appendChild(heading);
            display.appendChild(list);
          }
        } catch (err) {
          errorDiv.textContent =
            "Could not reach the weather service. Check your connection and try again.";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = submitLabel;
        }
      });
    </script>
  </body>
</html>

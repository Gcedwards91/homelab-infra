---
name: CI - Integration Tests

"on":
  push:
    branches: [master]
    paths:
      - "weather-app/docker-final/**"
      - "weather-app/demo-container/**"
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_destructive:
        description: "Also run destructive alerting tests (stops containers, ~5 min)"
        type: boolean
        default: false

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env for CI
        working-directory: weather-app/docker-final
        run: |
          cp .env.example .env
          SECRET=$(python3 -c 'import secrets; print(secrets.token_hex(32))')
          sed -i "s|change-me-generate-a-real-secret|$SECRET|g" .env
          # Fail loudly if the placeholder wasn't replaced — pattern must match .env.example
          if grep -q "change-me-generate-a-real-secret" .env; then
            echo "ERROR: placeholder secrets were not replaced in .env" >&2
            exit 1
          fi

      - name: Pull images
        working-directory: weather-app/docker-final
        run: docker compose pull

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan own images for critical CVEs
        id: own-image-scan
        working-directory: weather-app/docker-final
        run: |
          mkdir -p /tmp/own-scans
          docker compose config --images | sort -u | grep "^burningstar4/" | while read -r image; do
            echo "=== Scanning (own): $image ==="
            if ! trivy image --ignore-unfixed --severity CRITICAL --exit-code 1 \
                "$image" > /tmp/own-scan-tmp.txt 2>&1; then
              cat /tmp/own-scan-tmp.txt
              {
                printf '### %s\n```\n' "$image"
                cat /tmp/own-scan-tmp.txt
                printf '```\n\n'
              } >> /tmp/own-scans/report.txt
              echo "$image" >> /tmp/own-scans/images.txt
            else
              cat /tmp/own-scan-tmp.txt
            fi
          done
          if [ -f /tmp/own-scans/images.txt ]; then
            echo "Own image CVEs detected — failing CI"
            exit 1
          fi

      - name: Open GitHub issue for own image CVEs
        if: failure() && steps.own-image-scan.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const reportPath = '/tmp/own-scans/report.txt';
            const imagesPath = '/tmp/own-scans/images.txt';

            if (!fs.existsSync(reportPath) || !fs.existsSync(imagesPath)) {
              console.log('No own-image CVE report found — scan may have failed for another reason.');
              return;
            }

            const images = fs.readFileSync(imagesPath, 'utf8').trim().split('\n').filter(Boolean);
            const report = fs.readFileSync(reportPath, 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'own-image-cve',
              per_page: 10,
            });

            const body = [
              '## Own image CVEs detected — CI blocked',
              '',
              'CRITICAL CVEs with available fixes found in one or more `burningstar4/` images. CI is blocked until these are resolved.',
              '',
              `**Run:** ${runUrl}`,
              `**Commit:** ${shortSha}`,
              `**Affected images:** ${images.join(', ')}`,
              '',
              '## Scan results',
              '',
              report.slice(-4000),
              '## Resolution',
              '1. Add `apt-get upgrade -y` to the affected Dockerfile(s) to pull patched OS packages',
              '2. Update vulnerable Python packages in `requirements.txt`',
              '3. Rebuild with `make build-<service>` and run `make scan` locally to verify',
              '4. Push — CI will auto-close this issue when the scan passes',
            ].join('\n');

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Updated scan — ${shortSha}\n\n**Affected:** ${images.join(', ')}\n**Run:** ${runUrl}\n\n${report.slice(-3000)}`,
              });
              console.log(`Updated own-image CVE issue #${issue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[OWN-CVE] Critical CVEs in own images: ${images.join(', ')}`,
                body,
                labels: ['own-image-cve', 'test-failure'],
              });
              console.log('Created new own-image CVE issue');
            }

      - name: Close own image CVE issue if scan passes
        if: always() && steps.own-image-scan.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'own-image-cve',
              per_page: 10,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Own image CVEs resolved\n\n**Run:** ${runUrl}\n**Commit:** ${shortSha}\n\nAll \`burningstar4/\` images pass the CRITICAL CVE scan. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed own-image CVE issue #${issue.number}`);
            }

      - name: Scan vendor images for critical CVEs
        working-directory: weather-app/docker-final
        run: |
          mkdir -p /tmp/vendor-scans
          docker compose config --images | sort -u | grep -v "^burningstar4/" | while read -r image; do
            echo "=== Scanning (vendor): $image ==="
            if ! trivy image --ignore-unfixed --severity CRITICAL --exit-code 1 \
                "$image" > /tmp/vendor-scan-tmp.txt 2>&1; then
              echo "CRITICAL CVEs found in $image (will open GitHub issue)"
              cat /tmp/vendor-scan-tmp.txt
              {
                printf '### %s\n```\n' "$image"
                cat /tmp/vendor-scan-tmp.txt
                printf '```\n\n'
              } >> /tmp/vendor-scans/report.txt
              echo "$image" >> /tmp/vendor-scans/images.txt
            else
              cat /tmp/vendor-scan-tmp.txt
            fi
          done

      - name: Report vendor CVEs via GitHub issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const reportPath = '/tmp/vendor-scans/report.txt';
            const imagesPath = '/tmp/vendor-scans/images.txt';
            const hasVulns = fs.existsSync(reportPath) && fs.existsSync(imagesPath);

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vendor-cve',
              per_page: 10,
            });

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);

            if (!hasVulns) {
              for (const issue of existing.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## All vendor CVEs resolved\n\n**Run:** ${runUrl}\n**Commit:** ${shortSha}\n\nNo CRITICAL CVEs detected in any vendor image. Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Closed vendor CVE issue #${issue.number}`);
              }
              return;
            }

            const images = fs.readFileSync(imagesPath, 'utf8').trim().split('\n').filter(Boolean);
            const report = fs.readFileSync(reportPath, 'utf8');

            const body = [
              '## Vendor image CVEs detected',
              '',
              'CRITICAL CVEs with available fixes found in vendor images. These cannot be patched directly — they require upstream vendor releases.',
              'Dependabot will open a PR automatically when patched image tags are published.',
              '',
              `**Run:** ${runUrl}`,
              `**Commit:** ${shortSha}`,
              `**Affected images:** ${images.join(', ')}`,
              '',
              '## Scan results',
              '',
              report.slice(-4000),
              '## Resolution',
              '1. Monitor vendor release pages for patched versions',
              '2. Bump image tags in `weather-app/docker-final/docker-compose.yml`',
              '3. Run `make scan` locally to verify CVEs are resolved',
              '4. Push — CI will auto-close this issue when the scan passes',
            ].join('\n');

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Updated scan — ${shortSha}\n\n**Affected:** ${images.join(', ')}\n**Run:** ${runUrl}\n\n${report.slice(-3000)}`,
              });
              console.log(`Updated vendor CVE issue #${issue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[VENDOR-CVE] Critical CVEs in vendor images: ${images.join(', ')}`,
                body,
                labels: ['vendor-cve'],
              });
              console.log('Created new vendor CVE issue');
            }

      - name: Start stack
        working-directory: weather-app/docker-final
        run: docker compose up -d

      - name: Wait for healthchecks to pass
        run: |
          for service in prometheus grafana statporter alertmanager demo-container; do
            echo "Waiting for $service..."
            if ! timeout 180 bash -c \
              "until [ \"\$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $service 2>/dev/null)\" = 'healthy' ]; do sleep 3; done"; then
              echo "TIMED OUT waiting for $service"
              docker inspect "$service" --format='Status: {{.State.Status}} Health: {{.State.Health.Status}}'
              docker logs "$service" --tail 30
              exit 1
            fi
            echo "$service is healthy"
          done

      - name: Wait for Loki readiness
        run: |
          echo "Waiting for loki /ready..."
          if ! timeout 120 bash -c \
            "until docker exec prometheus wget -q --spider http://loki:3100/ready 2>/dev/null; do sleep 3; done"; then
            echo "TIMED OUT waiting for loki"
            docker inspect loki --format='Status: {{.State.Status}}'
            docker logs loki --tail 30
            exit 1
          fi
          echo "loki is ready"
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r weather-app/docker-final/requirements-dev.txt

      - name: Run integration tests
        run: |
          set -o pipefail
          pytest weather-app/docker-final/tests/ -v --tb=short 2>&1 | tee test-output.txt

      - name: Capture service logs on failure
        if: failure()
        working-directory: weather-app/docker-final
        run: |
          mkdir -p /tmp/service-logs
          for service in weather-app statporter prometheus grafana loki promtail alertmanager reverse-proxy demo-container; do
            docker logs $service --tail 50 2>&1 > /tmp/service-logs/${service}.log || echo "no logs available" > /tmp/service-logs/${service}.log
          done

      - name: Create GitHub issue on test failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");

            const serviceMap = {
              // terms: normalized strings matched against FAILED lines for unit test detection.
              // Pass 1 matches single-quoted container names ('weather-app') in any output line.
              // Pass 2 matches terms against lowercased FAILED lines (test file paths + class names).
              // reverse-proxy and demo-container need aliases because Python files use underscores
              // and nginx tests may not reference the full container name.
              "weather-app": { prefix: "WA", label: "svc:weather-app", terms: ["weather_app"] },
              statporter: { prefix: "SP", label: "svc:statporter", terms: ["statporter"] },
              prometheus: { prefix: "PROM", label: "svc:prometheus", terms: ["prometheus"] },
              grafana: { prefix: "GRF", label: "svc:grafana", terms: ["grafana"] },
              loki: { prefix: "LOKI", label: "svc:loki", terms: ["loki"] },
              promtail: { prefix: "PT", label: "svc:promtail", terms: ["promtail"] },
              alertmanager: { prefix: "AM", label: "svc:alertmanager", terms: ["alertmanager"] },
              "reverse-proxy": { prefix: "NGX", label: "svc:nginx", terms: ["reverse_proxy", "nginx"] },
              "demo-container": { prefix: "DEMO", label: "svc:demo-container", terms: ["demo_container"] },
            };

            const rawOutput = fs.existsSync("test-output.txt")
              ? fs.readFileSync("test-output.txt", "utf8")
              : "";

            const isEmpty = rawOutput.trim().length === 0;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const seq = String(context.runNumber).padStart(4, "0");

            let prefix, title, labels, body;

            if (isEmpty) {
              prefix = "CI";
              labels = ["test-failure", "ci"];
              title = `[CI-${seq}] test suite failed to launch (commit: ${shortSha})`;
              body = [
                "## CI failure — test output empty",
                "",
                "`pytest` either failed to start or produced no output.",
                "",
                `**Run:** ${runUrl}`,
                `**Commit:** ${shortSha}`,
                "",
                "## To investigate",
                "```",
                "Check the Actions run log directly — no test output was captured.",
                "```",
                "",
                "## To close this issue",
                "1. Fix the underlying CI configuration or environment issue",
                "2. Go to **Actions → targeted-test.yml → Run workflow**",
                "3. Set **Service** to the affected service",
                "4. Set **Issue number** to the issue number shown in the title of this issue",
              ].join("\n");
            } else {
              // Pass 1: single-quoted container names in any output line (integration tests)
              const fromContainerNames = new Set(
                Object.entries(serviceMap)
                  .filter(([name]) => rawOutput.includes(`'${name}'`))
                  .map(([, meta]) => meta.label)
              );

              // Pass 2: FAILED lines matched against normalized terms (unit tests)
              const failedBlock = rawOutput
                .split("\n")
                .filter((l) => l.trimStart().startsWith("FAILED "))
                .join("\n")
                .toLowerCase();

              const fromFailedLines = new Set(
                Object.entries(serviceMap)
                  .filter(([, meta]) => meta.terms.some((t) => failedBlock.includes(t)))
                  .map(([, meta]) => meta.label)
              );

              const detectedLabels = new Set([...fromContainerNames, ...fromFailedLines]);
              const detectedServices = Object.entries(serviceMap)
                .filter(([, meta]) => detectedLabels.has(meta.label))
                .map(([name, meta]) => ({ name, ...meta }));

              const isStack = detectedServices.length > 1;

              prefix =
                detectedServices.length === 1
                  ? detectedServices[0].prefix
                  : detectedServices.length > 1
                    ? "STACK"
                    : "CI";

              labels = ["test-failure", ...detectedServices.map((s) => s.label)];
              if (detectedServices.length === 0) labels.push("ci");

              title = `[${prefix}-${seq}] integration test failure (commit: ${shortSha})`;

              const logSections = [];
              for (const { name } of detectedServices) {
                const logPath = `/tmp/service-logs/${name}.log`;
                const logs = fs.existsSync(logPath) ? fs.readFileSync(logPath, "utf8") : "no logs captured";
                logSections.push(`### ${name}\n\`\`\`\n${logs}\n\`\`\``);
              }

              const closeInstructions = isStack
                ? [
                    "## To close this issue",
                    "This issue covers multiple failing services. Run targeted-test.yml for each service separately.",
                    "Once all services pass, close this issue manually.",
                    "",
                    "For each failing service:",
                    "1. Fix the service",
                    "2. Go to **Actions → targeted-test.yml → Run workflow**",
                    "3. Set **Service** to the affected service",
                    "4. Set **Issue number** to the issue number shown in the title of this issue",
                    "5. Verify the targeted test passes and the comment is posted",
                    "6. Repeat for all remaining services",
                    "7. Close this issue manually once all services are green",
                  ]
                : [
                    "## To close this issue",
                    "1. Fix the failing service",
                    "2. Go to **Actions → targeted-test.yml → Run workflow**",
                    "3. Set **Service** to the affected service",
                    "4. Set **Issue number** to the issue number shown in the title of this issue",
                  ];

              body = [
                "## Integration test failure",
                "",
                `**Run:** ${runUrl}`,
                `**Commit:** ${shortSha}`,
                "",
                "## Test output (last 3000 chars)",
                "```",
                rawOutput.slice(-3000),
                "```",
                "",
                logSections.length > 0 ? "## Service logs\n\n" + logSections.join("\n\n") : "",
                "",
                ...closeInstructions,
              ].join("\n");
            }

            // Duplicate check — don't open a second issue for the same commit
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "test-failure",
              per_page: 100,
            });

            const duplicate = existing.data.find((i) => i.title.includes(shortSha));
            if (duplicate) {
              console.log(`Duplicate suppressed — issue #${duplicate.number} already exists for ${shortSha}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });

      - name: Tear down stack
        if: always()
        working-directory: weather-app/docker-final
        run: docker compose down -v

  # Destructive alerting lifecycle tests (TESTING_CHECKLIST sections 4, 9.5, 9.6).
  # These stop containers and wait out alert windows, so they run only on a manual
  # dispatch with run_destructive=true, in an isolated stack, never on push.
  destructive-alerting-tests:
    if: github.event_name == 'workflow_dispatch' && inputs.run_destructive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env for CI
        working-directory: weather-app/docker-final
        run: |
          cp .env.example .env
          SECRET=$(python3 -c 'import secrets; print(secrets.token_hex(32))')
          sed -i "s|change-me-generate-a-real-secret|$SECRET|g" .env
          if grep -q "change-me-generate-a-real-secret" .env; then
            echo "ERROR: placeholder secrets were not replaced in .env" >&2
            exit 1
          fi

      - name: Pull images
        working-directory: weather-app/docker-final
        run: docker compose pull

      - name: Start stack
        working-directory: weather-app/docker-final
        run: docker compose up -d

      - name: Wait for healthchecks to pass
        run: |
          for service in prometheus grafana statporter alertmanager demo-container; do
            echo "Waiting for $service..."
            if ! timeout 180 bash -c \
              "until [ \"\$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $service 2>/dev/null)\" = 'healthy' ]; do sleep 3; done"; then
              echo "TIMED OUT waiting for $service"
              docker inspect "$service" --format='Status: {{.State.Status}} Health: {{.State.Health.Status}}'
              docker logs "$service" --tail 30
              exit 1
            fi
            echo "$service is healthy"
          done

      - name: Wait for Loki readiness
        run: |
          echo "Waiting for loki /ready..."
          if ! timeout 120 bash -c \
            "until docker exec prometheus wget -q --spider http://loki:3100/ready 2>/dev/null; do sleep 3; done"; then
            echo "TIMED OUT waiting for loki"
            docker inspect loki --format='Status: {{.State.Status}}'
            docker logs loki --tail 30
            exit 1
          fi
          echo "loki is ready"
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r weather-app/docker-final/requirements-dev.txt

      - name: Run destructive alerting tests
        run: |
          set -o pipefail
          pytest weather-app/docker-final/tests/test_alerting.py \
            -m destructive -v --tb=short 2>&1 | tee destructive-output.txt

      - name: Capture service logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/service-logs
          for service in loki demo-container statporter weather-app prometheus; do
            docker logs $service --tail 50 2>&1 > /tmp/service-logs/${service}.log || \
              echo "no logs available" > /tmp/service-logs/${service}.log
          done
          echo "=== service logs ==="
          for f in /tmp/service-logs/*.log; do echo "--- $f ---"; cat "$f"; done

      - name: Tear down stack
        if: always()
        working-directory: weather-app/docker-final
        run: docker compose down -v

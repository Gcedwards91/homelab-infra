---
name: CI - Integration Tests

"on":
  push:
    branches: [master]
    paths:
      - "weather-app/docker-final/**"
      - "weather-app/demo-container/**"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---- STACK SETUP ----
      - name: Create .env for CI
        working-directory: weather-app/docker-final
        run: |
          cp .env.example .env
          SECRET=$(python3 -c 'import secrets; print(secrets.token_hex(32))')
          sed -i "s|change-me-generate-a-real-secret|$SECRET|g" .env
          # Fail loudly if the placeholder wasn't replaced — pattern must match .env.example
          if grep -q "change-me-generate-a-real-secret" .env; then
            echo "ERROR: placeholder secrets were not replaced in .env" >&2
            exit 1
          fi

      - name: Pull images
        working-directory: weather-app/docker-final
        run: docker compose pull

      - name: Start stack
        working-directory: weather-app/docker-final
        run: docker compose up -d

      - name: Wait for healthchecks to pass
        run: |
          for service in prometheus grafana loki statporter alertmanager demo-container; do
            echo "Waiting for $service..."
            if ! timeout 180 bash -c \
              "until [ \"\$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $service 2>/dev/null)\" = 'healthy' ]; do sleep 3; done"; then
              echo "TIMED OUT waiting for $service"
              docker inspect "$service" --format='Status: {{.State.Status}} Health: {{.State.Health.Status}}'
              docker logs "$service" --tail 30
              exit 1
            fi
            echo "$service is healthy"
          done
          sleep 15

      # ---- TESTS ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r weather-app/docker-final/requirements-dev.txt

      - name: Run integration tests
        run: |
          set -o pipefail
          pytest weather-app/docker-final/tests/ -v --tb=short 2>&1 | tee test-output.txt

      # ---- ON FAILURE ----
      - name: Create GitHub issue on test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('test-output.txt')
              ? fs.readFileSync('test-output.txt', 'utf8').slice(-3000)
              : 'No test output captured.';

            const title =
              `Test failure: ${context.workflow} on ${context.sha.slice(0, 7)}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['test-failure']
            });

            if (!issues.find(i => i.title === title)) {
              const runUrl =
                `${context.serverUrl}/${context.repo.owner}/` +
                `${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['test-failure'],
                body: [
                  '## Integration test failure',
                  '',
                  `**Workflow:** ${context.workflow}`,
                  `**Commit:** ${context.sha}`,
                  `**Run:** ${runUrl}`,
                  '',
                  '### Test output (last 3000 chars)',
                  '```',
                  output,
                  '```',
                  '',
                  '_Auto-generated by GitHub Actions._',
                  '_Close this issue by fixing the failure and referencing it in',
                  'your commit message: `Fixes #N`_'
                ].join('\n')
              });
            }

      # ---- TEARDOWN ----
      - name: Tear down stack
        if: always()
        working-directory: weather-app/docker-final
        run: docker compose down -v

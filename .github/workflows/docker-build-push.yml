---
name: Docker Build and Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - ".github/workflows/**"
      - "docs/**"

jobs:
  build-weather-app:
    name: Build and Push Weather App
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ' '), 'weather-app/docker-src') ||
      contains(join(github.event.commits.*.added, ' '), 'weather-app/docker-src')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push weather-app
        uses: docker/build-push-action@v6
        with:
          context: weather-app/docker-src/
          push: true
          tags: burningstar4/weather-app:latest

  build-statporter:
    name: Build and Push Statporter
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ' '), 'weather-app/docker-final/statporter') ||
      contains(join(github.event.commits.*.added, ' '), 'weather-app/docker-final/statporter')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push statporter
        uses: docker/build-push-action@v6
        with:
          context: weather-app/docker-final/statporter/
          push: true
          tags: burningstar4/statporter:latest

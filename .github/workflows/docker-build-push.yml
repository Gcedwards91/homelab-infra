---
name: Docker Build and Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - ".github/workflows/**"
      - "docs/**"

jobs:
  build-weather-app:
    name: Build and Push Weather App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for weather-app changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'weather-app/docker-src/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to DockerHub
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push weather-app
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: weather-app/docker-src/
          push: true
          tags: burningstar4/weather-app:latest

  build-statporter:
    name: Build and Push Statporter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for statporter changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'weather-app/docker-final/statporter/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to DockerHub
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push statporter
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: weather-app/docker-final/statporter/
          push: true
          tags: burningstar4/statporter:latest

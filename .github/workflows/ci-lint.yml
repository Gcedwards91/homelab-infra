---
name: CI - Lint

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---- PYTHON ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install black flake8

      - name: Run Black (format check)
        run: black --check weather-app/docker-src/ weather-app/docker-final/statporter/

      - name: Run Flake8 (lint)
        run: flake8 weather-app/docker-src/ weather-app/docker-final/statporter/

      # ---- SHELL ----
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all .sh scripts
        run: find . -type f -name "*.sh" | xargs -r shellcheck -x -e SC1091

      # ---- FRONTEND/WEB ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install --global prettier

      - name: Run Prettier
        run: prettier --check "**/*.{js,json,css,html,md,yml,yaml}"

      # ---- DOCKER ----
      - name: Run Hadolint (docker-src)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "weather-app/docker-src/Dockerfile"

      - name: Run Hadolint (docker-final)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "weather-app/docker-final/statporter/Dockerfile"

      # ---- YAML ----
      - name: Install yamllint
        run: sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

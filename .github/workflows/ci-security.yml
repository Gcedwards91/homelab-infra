---
name: CI - Security

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (Python security scan)
        run: bandit -r weather-app/docker-src/ weather-app/docker-final/statporter/ -ll

      - name: Run Trivy (Dockerfile vulnerability scan)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE_KEY: ${{ secrets.GITLEAKS_LICENSE_KEY || '' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then npm install --ignore-scripts; fi

      - name: Run npm audit (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate
          fi
